<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C8102E"/>
      <stop offset="60%" stop-color="#A50E25"/>
      <stop offset="100%" stop-color="#8B0E1F"/>
    </linearGradient>
    <clipPath id="round">
      <rect width="256" height="256" rx="48" ry="48"/>
    </clipPath>
    <g id="daisy" fill="currentColor">
      <ellipse cx="0" cy="-16" rx="7" ry="16"/>
      <ellipse cx="0" cy="-16" rx="7" ry="16" transform="rotate(60)"/>
      <ellipse cx="0" cy="-16" rx="7" ry="16" transform="rotate(120)"/>
      <ellipse cx="0" cy="-16" rx="7" ry="16" transform="rotate(180)"/>
      <ellipse cx="0" cy="-16" rx="7" ry="16" transform="rotate(240)"/>
      <ellipse cx="0" cy="-16" rx="7" ry="16" transform="rotate(300)"/>
      <circle cx="0" cy="0" r="6"/>
    </g>
    <path id="leaf" fill="currentColor" d="M-26,0 C-9,-8 9,-8 26,0 C9,8 -9,8 -26,0 Z"/>
  </defs>

  <g clip-path="url(#round)">
    <rect width="256" height="256" fill="url(#bg)"/>

    <g color="#6B0A17" opacity="0.6">
      <use href="#daisy" transform="translate(38 42) rotate(15)"/>
      <use href="#daisy" transform="translate(210 50) rotate(-25) scale(0.85)"/>
      <use href="#daisy" transform="translate(222 210) rotate(40)"/>
      <use href="#daisy" transform="translate(42 214) rotate(-10) scale(0.8)"/>
      <use href="#daisy" transform="translate(128 36) scale(0.7)"/>
      <use href="#daisy" transform="translate(128 222) rotate(20) scale(0.7)"/>

      <use href="#leaf" transform="translate(92 66) rotate(-20)"/>
      <use href="#leaf" transform="translate(170 68) rotate(25)"/>
      <use href="#leaf" transform="translate(78 192) rotate(30)"/>
      <use href="#leaf" transform="translate(180 190) rotate(-30)"/>
    </g>

    <g fill="none" stroke="#6B0A17" stroke-width="3" stroke-linecap="round" opacity="0.45">
      <path d="M-10,76 C40,56 80,100 128,76 C176,52 216,96 270,76"/>
      <path d="M-10,184 C40,164 80,208 128,184 C176,160 216,204 270,184"/>
    </g>

    <text x="128" y="144"
          font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif"
          font-weight="900"
          font-size="40"
          letter-spacing="-1"
          text-anchor="middle"
          fill="#FFFFFF">SUPLEFEMME</text>
  </g>
</svg>
